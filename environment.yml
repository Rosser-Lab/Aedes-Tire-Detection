name: drone_dengue
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10.12
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - cudatoolkit=11.8
  - numpy=1.26.4
  - scikit-learn=1.5.1
  - rasterio=1.3.9
  - gdal=3.7.3
  - geopandas=0.14.1
  - opencv=4.8.1
  - matplotlib=3.8.2
  - tqdm=4.66.4
  - pathlib=1.0.1
  - typing=3.7.4.3
  - loguru=0.7.2
  - jupyterlab=4.0.11
  - pip=23.3.1
  - pip:
    - segmentation-models-pytorch==0.3.3
    - albumentations==1.3.1
    - pydantic==2.1.1
    - safetensors==0.3.0

# Notes on version choices:
# - Python 3.10.12: Latest stable in 3.10 series, proven compatible with all dependencies
# - PyTorch 2.1.0: Stable release with good CUDA support
# - CUDA 11.8: Wide compatibility with different GPU generations
# - numpy 1.26.4: Latest stable that works well with this PyTorch version
# - scikit-learn 1.5.1: Latest stable with good compatibility
# - rasterio 1.3.9: Stable version with good GDAL compatibility
# - GDAL 3.7.3: Latest stable with good Windows support
# - albumentations 1.3.1: Known working version with our image processing pipeline
# - pydantic 2.1.1: Specific version needed for compatibility

# If you encounter any issues:
# 1. Try installing GDAL and rasterio separately after environment creation
# 2. Some systems might need specific CUDA versions - adjust cudatoolkit version accordingly
# 3. If memory issues occur, you might need to install packages one by one 